name: perfume_gpt_mobile
packages:
  - apps/*
  - packages/*

scripts:
  analyze:
    exec: flutter analyze .
    description: Run analyze in all packages.
  test:
    exec: flutter test
    description: Run tests in all packages.
  get:
    exec: flutter pub get
    description: Run pub get in all packages.
  clean:
    exec: flutter clean
    description: Run clean in all packages.
  generate-api:
    run: |
      openapi-generator-cli generate -i https://localhost:7011/openapi/v1.json -g dart-dio -o packages/perfumegpt_api_client
      cd packages/perfumegpt_api_client
      dart pub get
      dart run build_runner build --delete-conflicting-outputs
    description: Regenerate the OpenAPI client and run build_runner.
